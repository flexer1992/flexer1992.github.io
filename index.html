<script type="text/javascript">

    var isLocalMode = true;
    var game;

    let scaleRatio = window.devicePixelRatio / 3;

    window.onload = function () {

        if(!isLocalMode)
        {
            FBInstant.initializeAsync().then(function() {

                FBInstant.setLoadingProgress(Math.ceil(100));

                // Preload images
                // IMAGES.forEach(function(imgName, index){
                //     var img = new Image();

                //     preloaded[imgName] = img;
                //     FBInstant.setLoadingProgress(Math.ceil(index / IMAGES.length)*100);
                // })

                // Finished loading. Start the game
                FBInstant.startGameAsync().then(function() {
                    startGame();
                });
            });
        }else
        {
            startGame();
        }
    };

    function startGame()
    {



        // window.game = new Phaser.Game(1080, 1920, Phaser.AUTO, 'wrapper');
        game = new Phaser.Game(window.innerWidth * window.devicePixelRatio, window.innerHeight * window.devicePixelRatio, Phaser.AUTO, 'wrapper');
        game.state.add('Game', BasicGame.Game);
        game.state.add('MainMenu', BasicGame.MainMenu);
        game.state.add('Preload', BasicGame.Preloader);
        game.state.add('Boot', BasicGame.Boot);
        game.state.start('Boot');


    }
